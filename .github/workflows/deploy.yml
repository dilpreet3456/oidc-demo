name: OIDC Demo

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: arn:aws:iam::230399361410:role/iAM-week5
          aws-region: us-east-1

      - name: Upload file to S3
        run: |
          aws s3 cp hello.txt s3://cloudops-week5-demo/
